apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: edge-rate-limit
  namespace: talk-to-work
spec:
  rateLimit:
    average: 120
    burst: 30
    period: 1m
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: edge-auth
  namespace: talk-to-work
spec:
  basicAuth:
    secret: talk-to-work-basic-auth
    realm: Talk to Work
    removeHeader: true
