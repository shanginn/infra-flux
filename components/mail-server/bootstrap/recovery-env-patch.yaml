apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: stalwart
  namespace: mail-system
spec:
  template:
    spec:
      containers:
        - name: stalwart
          env:
            - name: STALWART_RECOVERY_ADMIN
              valueFrom:
                secretKeyRef:
                  name: mail-recovery-bootstrap
                  key: recovery-admin
