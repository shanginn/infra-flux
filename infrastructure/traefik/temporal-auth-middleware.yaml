apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: temporal-basic-auth
  namespace: kube-system
spec:
  basicAuth:
    secret: temporal-basic-auth
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: temporal-rate-limit
  namespace: kube-system
spec:
  rateLimit:
    average: 30
    burst: 60
    period: 1m
