apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: talk-to-work
  namespace: flux-system
spec:
  interval: 10m0s
  retryInterval: 1m0s
  timeout: 10m0s
  wait: true
  path: ./clusters/rubase/talk-to-work
  prune: true
  dependsOn:
    - name: infrastructure
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
