apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mail-system

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - config.yaml
  - certificate.yaml
  - statefulset.yaml
  - service.yaml
  - admin-ingress.yaml
  - networkpolicy.yaml
  - pdb.yaml
  - reconciler.yaml
  - backup.yaml
  - blackbox-exporter.yaml
  - monitoring.yaml
  - alerts.yaml

configMapGenerator:
  - name: mail-reconciler
    files:
      - render-plan.rb=scripts/render-plan.rb
      - render-prune.rb=scripts/render-prune.rb
      - backup.sh=scripts/backup.sh

generatorOptions:
  labels:
    app.kubernetes.io/part-of: mail-hub
