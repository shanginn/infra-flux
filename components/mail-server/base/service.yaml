apiVersion: v1
kind: Service
metadata:
  name: stalwart
  namespace: mail-system
  labels:
    app.kubernetes.io/name: stalwart
    app.kubernetes.io/instance: mail-hub
spec:
  type: ClusterIP
  # Stable internal-only endpoint used by the TLS backup hostAlias. This is
  # the ClusterIP originally allocated to this Service; it is not public.
  clusterIP: 10.43.43.91
  selector:
    app.kubernetes.io/name: stalwart
    app.kubernetes.io/instance: mail-hub
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: https-internal
      port: 8443
      targetPort: https-internal
    # JMAP discovery advertises the canonical https://mail-admin... API URL.
    # Backup-Pod hostAliases keep that hostname on this internal ClusterIP.
    - name: https-canonical
      port: 443
      targetPort: https-internal
    - name: smtp
      port: 25
      targetPort: smtp
    - name: submissions
      port: 465
      targetPort: submissions
    - name: submission
      port: 587
      targetPort: submission
    - name: imaps
      port: 993
      targetPort: imaps
