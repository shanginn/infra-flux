apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mail-system

resources:
  - secrets/system-credentials.enc.yaml
  - secrets/dkim-keys.enc.yaml
  - secrets/backup-credentials.enc.yaml

configMapGenerator:
  - name: mail-domain-catalog
    files:
      - vibesites.ru.yaml=domains/vibesites.ru.yaml

generatorOptions:
  labels:
    app.kubernetes.io/part-of: mail-hub
