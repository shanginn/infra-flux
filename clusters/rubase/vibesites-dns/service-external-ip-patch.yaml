apiVersion: v1
kind: Service
metadata:
  name: vibesites-dnsdist
  namespace: vibesites-dns
spec:
  type: ClusterIP
  externalIPs:
    - 185.221.212.224
  ports:
    - name: dns-tcp
      port: 53
      protocol: TCP
      targetPort: dns-tcp
    - name: dns-udp
      port: 53
      protocol: UDP
      targetPort: dns-udp
