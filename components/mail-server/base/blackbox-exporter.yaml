apiVersion: v1
kind: ConfigMap
metadata:
  name: mail-blackbox-exporter
  namespace: mail-system
data:
  blackbox.yml: |
    modules:
      tcp_connect:
        prober: tcp
        timeout: 5s
      implicit_tls:
        prober: tcp
        timeout: 8s
        tcp:
          tls: true
          tls_config:
            server_name: mx1.shanginn.io
            min_version: TLS12
      http_2xx:
        prober: http
        timeout: 8s
        http:
          method: GET
          preferred_ip_protocol: ip4
          fail_if_not_ssl: true
          tls_config:
            min_version: TLS12
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail-blackbox-exporter
  namespace: mail-system
  labels:
    app.kubernetes.io/name: mail-blackbox-exporter
    app.kubernetes.io/part-of: mail-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mail-blackbox-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mail-blackbox-exporter
        app.kubernetes.io/part-of: mail-hub
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: blackbox-exporter
          image: prom/blackbox-exporter:v0.27.0
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/config/blackbox.yml
            - --web.listen-address=:9115
          ports:
            - name: http
              containerPort: 9115
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: mail-blackbox-exporter
        - name: tmp
          emptyDir:
            sizeLimit: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mail-blackbox-exporter
  namespace: mail-system
  labels:
    app.kubernetes.io/name: mail-blackbox-exporter
spec:
  selector:
    app.kubernetes.io/name: mail-blackbox-exporter
  ports:
    - name: http
      port: 9115
      targetPort: http
