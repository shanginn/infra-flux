apiVersion: v1
kind: Service
metadata:
  name: stalwart-public
  namespace: mail-system
  labels:
    app.kubernetes.io/name: stalwart
    app.kubernetes.io/instance: mail-hub
    app.kubernetes.io/part-of: mail-hub
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app.kubernetes.io/name: stalwart
    app.kubernetes.io/instance: mail-hub
  ports:
    - name: smtp
      port: 25
      targetPort: smtp
      protocol: TCP
    - name: submissions
      port: 465
      targetPort: submissions
      protocol: TCP
    - name: submission
      port: 587
      targetPort: submission
      protocol: TCP
    - name: imaps
      port: 993
      targetPort: imaps
      protocol: TCP
